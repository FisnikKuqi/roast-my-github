<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roast My GitHub</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <h1>Roast My GitHub</h1>
      <p class="subtitle">
        Enter your GitHub username and prepare to be humbled.
      </p>
      <input
        type="text"
        id="username"
        placeholder="GitHub username"
        autocomplete="off"
      />
      <select id="style">
        <option value="friendly">Friendly roast</option>
        <option value="corporate">Corporate jargon</option>
        <option value="pirate">Pirate</option>
        <option value="haiku">Haiku</option>
      </select>
      <button id="roastBtn">Roast me</button>
    </div>
    <script src="app.js"></script>
  </body>
</html>
